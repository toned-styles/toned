<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toned Styles - Documentation</title>
    <style>
      /* Modern CSS reset */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { margin: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }
      img, picture, video, canvas, svg { display: block; max-width: 100%; }
      input, button, textarea, select { font: inherit; color: inherit; }
      button { background: none; border: none; cursor: pointer; }
      p, h1, h2, h3, h4, h5, h6 { overflow-wrap: break-word; }
      a { color: inherit; text-decoration: inherit; }
      /* CSS-only mobile menu toggle (works without JS) */
      @media (max-width: 767px) {
        #menu-toggle:checked ~ [role="button"] {
          display: none !important;
        }
        #menu-toggle:checked ~ nav {
          display: block !important;
          position: fixed !important;
        }
        #menu-toggle:checked ~ [role="presentation"] {
          display: block !important;
        }
      }
    </style>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
